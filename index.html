<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>/grow — My Games & Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0e13;
      --surface:   #111620;
      --border:    #1e2735;
      --accent:    #00ffc8;
      --accent2:   #ff4e6a;
      --text:      #c9d1e0;
      --muted:     #4a566b;
      --white:     #eef2f8;
      --card-h:    220px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 180px;
      opacity: .35;
    }

    /* ── ambient glow blobs ── */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(120px); pointer-events: none; z-index: 0;
    }
    .blob-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,255,200,.12) 0%, transparent 70%);
      top: -200px; left: -200px;
    }
    .blob-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(255,78,106,.10) 0%, transparent 70%);
      bottom: -150px; right: -150px;
    }

    /* ── layout wrapper ── */
    .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

    /* ── header ── */
    header {
      padding: 48px 0 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }

    .logo-block { display: flex; flex-direction: column; gap: 6px; }

    .logo-tag {
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--accent); opacity: .75;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1;
      letter-spacing: -.02em;
    }
    .logo span { color: var(--accent); }

    .header-meta {
      text-align: right;
      font-size: 11px; color: var(--muted); line-height: 1.7;
    }
    .header-meta strong { color: var(--accent); }

    /* ── filter bar ── */
    .filter-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 28px 0 0;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      padding: 7px 16px; border-radius: 4px;
      cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,255,200,.06);
    }

    /* ── search ── */
    .search-wrap {
      position: relative; flex: 1; min-width: 200px; max-width: 320px;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--white); font-family: 'Space Mono', monospace; font-size: 12px;
      padding: 8px 12px 8px 36px; outline: none; transition: border-color .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus { border-color: var(--accent); }

    /* ── grid ── */
    .grid-header {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 36px 0 16px;
    }
    .grid-title {
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .18em; color: var(--muted);
    }
    #count { font-size: 11px; color: var(--muted); }

    #pages-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
      list-style: none;
      padding-bottom: 80px;
    }

    /* ── card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform .25s, border-color .25s, box-shadow .25s;
      animation: fadeUp .4s ease both;
      cursor: pointer;
      text-decoration: none;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 0 32px rgba(0,255,200,.12);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      height: var(--card-h); background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .card-thumb iframe {
      width: 100%; height: 100%;
      border: none; pointer-events: none;
      transform-origin: top left;
    }
    .card-thumb .thumb-icon {
      font-size: 3rem; opacity: .25; user-select: none;
    }
    .card-thumb .tag-badge {
      position: absolute; top: 10px; right: 10px;
      font-size: 9px; letter-spacing: .14em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 3px;
      background: rgba(0,0,0,.55); backdrop-filter: blur(4px);
      border: 1px solid var(--border); color: var(--muted);
    }

    .card-body { padding: 16px 18px 18px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .card-title {
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      color: var(--white); letter-spacing: -.01em;
    }

    .card-desc { font-size: 11px; color: var(--muted); line-height: 1.7; flex: 1; }

    .card-footer {
      margin-top: 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .card-date { font-size: 10px; color: var(--muted); opacity: .65; }
    .card-link {
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent); text-decoration: none; display: flex; align-items: center; gap: 5px;
      transition: gap .2s;
    }
    .card-link:hover { gap: 9px; }

    /* ── empty state ── */
    #empty {
      display: none; grid-column: 1/-1;
      padding: 60px 20px; text-align: center; color: var(--muted);
    }
    #empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: .3; }
    #empty p { font-size: 12px; line-height: 1.8; }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 0;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
      font-size: 10px; color: var(--muted); letter-spacing: .08em;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--accent); }
    .dot { color: var(--border); margin: 0 6px; }

    /* ── scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .header-meta { text-align: left; }
      .search-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrapper">
    <header>
      <div class="logo-block">
        <span class="logo-tag">digital garden</span>
        <h1 class="logo">/<span>grow</span></h1>
      </div>
      <div class="header-meta">
        Auto-generated daily<br>
        Last update: <strong id="last-update">—</strong><br>
        <span id="total-count">0</span> pages seeded
      </div>
    </header>

    <nav class="filter-bar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search" type="text" placeholder="Search pages…" autocomplete="off">
      </div>
      <button class="filter-btn active" data-tag="all">All</button>
      <button class="filter-btn" data-tag="game">Games</button>
      <button class="filter-btn" data-tag="tool">Tools</button>
      <button class="filter-btn" data-tag="art">Art</button>
      <button class="filter-btn" data-tag="story">Stories</button>
    </nav>

    <div class="grid-header">
      <span class="grid-title">Pages</span>
      <span id="count"></span>
    </div>

    <ul id="pages-list">
      <!-- Cards injected by JS -->
      <li id="empty">
        <div class="empty-icon">🌱</div>
        <p>No pages match your search.<br>Try a different keyword or filter.</p>
      </li>
    </ul>

    <footer>
      <span>Built with 🤖 &amp; GitHub Actions</span>
      <span>
        <a href="wishlist.txt">wishlist.txt</a>
        <span class="dot">·</span>
        <a href="https://github.com" target="_blank">source</a>
      </span>
    </footer>
  </div>

  <script>
    // ─────────────────────────────────────────────
    //  DATA — auto-generated by generate_game.py
    //  Each object: { title, file, desc, tag, date, icon }
    // ─────────────────────────────────────────────
    const PAGES = [
      // GENERATED_PAGES_START
{
  title: "Memory Grid",
  file:  "games/memory-grid.html",
  desc:  "flip & match emoji cards, timed challenge mode",
  tag:   "game",
  date:  "2026-05-27",
  icon:  "🧩"
},
{
  title: "Asteroid Drift",
  file:  "games/asteroid-drift.html",
  desc:  "2D top-down asteroid dodge, keyboard + touch",
  tag:   "game",
  date:  "2026-05-27",
  icon:  "🕹️"
},
{
  title: "Snake Reborn",
  file:  "games/snake-reborn.html",
  desc:  "classic snake with neon trail and speed ramp",
  tag:   "game",
  date:  "2026-05-27",
  icon:  "⚡"
},
      {
        title: "Pixel Maze",
        file:  "games/pixel-maze.html",
        desc:  "Navigate a procedurally generated maze. Arrow keys to move.",
        tag:   "game",
        date:  "2025-05-20",
        icon:  "🧩"
      },
      {
        title: "Gravity Sketch",
        file:  "games/gravity-sketch.html",
        desc:  "Draw shapes and watch them fall under simulated gravity.",
        tag:   "art",
        date:  "2025-05-21",
        icon:  "🎨"
      },
      {
        title: "Word Blitz",
        file:  "games/word-blitz.html",
        desc:  "Type words as fast as you can before they hit the bottom.",
        tag:   "game",
        date:  "2025-05-22",
        icon:  "⚡"
      },
      {
        title: "Palette Tool",
        file:  "tools/palette.html",
        desc:  "Generate harmonious color palettes from a seed hex code.",
        tag:   "tool",
        date:  "2025-05-23",
        icon:  "🎨"
      }
      // GENERATED_PAGES_END
    ];

    // ─────────────────────────────────────────────
    //  Render
    // ─────────────────────────────────────────────
    const list   = document.getElementById('pages-list');
    const empty  = document.getElementById('empty');
    const count  = document.getElementById('count');
    const total  = document.getElementById('total-count');
    const search = document.getElementById('#search') || document.getElementById('search');
    const lastUp = document.getElementById('last-update');
    const btns   = document.querySelectorAll('.filter-btn');

    let activeTag = 'all';
    let query     = '';

    total.textContent = PAGES.length;
    if (PAGES.length) {
      const latest = PAGES.map(p => p.date).sort().pop();
      lastUp.textContent = new Date(latest).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    function render() {
      const oldCards = list.querySelectorAll('li:not(#empty)');
      oldCards.forEach(c => c.remove());

      const filtered = PAGES.filter(p => {
        const matchTag = activeTag === 'all' || p.tag === activeTag;
        const matchQ   = !query || p.title.toLowerCase().includes(query) || p.desc.toLowerCase().includes(query);
        return matchTag && matchQ;
      });

      count.textContent = `${filtered.length} of ${PAGES.length}`;

      if (!filtered.length) {
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';

      filtered.forEach((p, i) => {
        const li = document.createElement('li');
        li.style.animationDelay = `${i * 55}ms`;

        li.innerHTML = `
          <a class="card" href="${p.file}">
            <div class="card-thumb">
              <span class="thumb-icon">${p.icon}</span>
              <span class="tag-badge">${p.tag}</span>
            </div>
            <div class="card-body">
              <div class="card-title">${p.title}</div>
              <div class="card-desc">${p.desc}</div>
              <div class="card-footer">
                <span class="card-date">${p.date}</span>
                <span class="card-link">Open →</span>
              </div>
            </div>
          </a>`;
        list.insertBefore(li, empty);
      });
    }

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTag = btn.dataset.tag;
        render();
      });
    });

    document.getElementById('search').addEventListener('input', e => {
      query = e.target.value.toLowerCase().trim();
      render();
    });

    render();
  </script>
</body>
</html>
