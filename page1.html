<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Neon Arcade Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #05050a;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 100%;
            padding: 10px;
        }

        /* Retro Arcade Cabinet Border Look */
        .arcade-cabinet {
            background: linear-gradient(145deg, #121225, #080815);
            border: 4px solid #00ffcc;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.3),
                        inset 0 0 15px rgba(0, 255, 204, 0.1);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Bar Info */
        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 12px;
            font-size: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .hud-val {
            color: #ff3366;
            text-shadow: 0 0 5px rgba(255, 51, 102, 0.8);
            font-size: 12px;
        }

        .hud-val.high {
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
        }

        /* Canvas Wrapper & Layering */
        .canvas-container {
            position: relative;
            width: 400px;
            height: 400px;
            border: 3px solid #ff3366;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.3);
            background-color: #0a0a12;
            overflow: hidden;
        }

        @media (max-width: 440px) {
            .canvas-container {
                width: 320px;
                height: 320px;
            }
            .hud {
                max-width: 320px;
            }
            .ctrl-btn {
                width: 50px !important;
                height: 50px !important;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Overlays (Start, Pause, Game Over) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            text-align: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .overlay-title {
            font-size: 18px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8);
            margin-bottom: 25px;
            line-height: 1.5;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        .btn-retro {
            background-color: transparent;
            border: 2px solid #ff3366;
            color: #ff3366;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 12px 24px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 8px rgba(255, 51, 102, 0.4);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-retro:hover, .btn-retro:active {
            background-color: #ff3366;
            color: #05050a;
            box-shadow: 0 0 15px rgba(255, 51, 102, 0.8);
            transform: scale(1.05);
        }

        /* Sound Toggle */
        .audio-toggle {
            position: absolute;
            top: -45px;
            right: 0;
            background: none;
            border: none;
            color: #00ffcc;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            cursor: pointer;
            outline: none;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Mobile On-screen Controls */
        .mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
            gap: 5px;
        }

        /* Show mobile controls on devices that support hoverless pointer or small screens */
        @media (max-width: 1024px) {
            .mobile-controls {
                display: flex;
            }
        }

        .ctrl-row {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .ctrl-btn {
            width: 55px;
            height: 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #00ffcc;
            border-radius: 50%;
            color: #00ffcc;
            font-size: 18px;
            font-family: sans-serif; /* simple characters render better */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
            transition: all 0.1s ease;
            touch-action: manipulation;
        }

        .ctrl-btn:active {
            background: #00ffcc;
            color: #05050a;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.8);
            transform: scale(0.9);
        }

        /* Hidden placeholder to center layout on top row of mobile controls */
        .ctrl-spacer {
            width: 55px;
            height: 55px;
        }

        /* Desktop Instructions */
        .instructions {
            margin-top: 15px;
            font-size: 8px;
            color: #666688;
            text-align: center;
            line-height: 1.6;
            max-width: 400px;
        }

        @media (max-width: 1024px) {
            .instructions {
                display: none; /* Hide desktop instructions on touch screens */
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="arcade-cabinet">
            <!-- Sound controller -->
            <button class="audio-toggle" id="audioToggle">SOUND: ON</button>

            <!-- Score / Information HUD -->
            <div class="hud">
                <div class="hud-item">
                    <span>SCORE</span>
                    <span class="hud-val" id="score">000</span>
                </div>
                <div class="hud-item">
                    <span>HI-SCORE</span>
                    <span class="hud-val high" id="highScore">000</span>
                </div>
            </div>

            <!-- Main Screen Area -->
            <div class="canvas-container">
                <canvas id="gameCanvas" width="400" height="400"></canvas>
                
                <!-- Game Over/Start overlay screen -->
                <div id="overlay" class="overlay">
                    <div id="overlayTitle" class="overlay-title">RETRO SNAKE<br>ARCADE</div>
                    <button id="startBtn" class="btn-retro">START GAME</button>
                </div>
            </div>

            <!-- Virtual Controller for Mobile -->
            <div class="mobile-controls">
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="btnUp">▲</button>
                </div>
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <div class="ctrl-spacer"></div>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                </div>
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="btnDown">▼</button>
                </div>
            </div>
        </div>

        <!-- Desktop Instruction guide -->
        <div class="instructions">
            USE ARROW KEYS OR WASD TO NAVIGATE.<br>
            PRESS [SPACEBAR] OR [P] TO PAUSE THE ACTION.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const overlay = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const startBtn = document.getElementById('startBtn');
        const audioToggle = document.getElementById('audioToggle');

        // Grid configurations
        const gridSize = 20; // Size of each grid cell
        const tileCount = canvas.width / gridSize; // 20x20 Grid

        // Game State Variables
        let snake = [];
        let dx = gridSize;
        let dy = 0;
        let nextDx = gridSize;
        let nextDy = 0;
        let food = { x: 0, y: 0 };
        let superFood = null;
        let superFoodTimer = 0;
        let score = 0;
        let highScore = localStorage.getItem('snake_high') || 0;
        let isGameOver = true;
        let isPaused = false;
        let soundEnabled = true;
        let lastTime = 0;
        let gameSpeed = 120; // Frame interval in milliseconds
        let particles = [];

        // Audio System (Synthesizer via Web Audio API)
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'eat') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); // A5
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'superEat') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
                osc.frequency.setValueAtTime(1174.66, audioCtx.currentTime + 0.06); // D6
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'die') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            }
        }

        // Setup Audio Toggle Element
        audioToggle.addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            audioToggle.innerText = `SOUND: ${soundEnabled ? 'ON' : 'OFF'}`;
            playSound('click');
        });

        // Initialize display
        highScoreEl.innerText = String(highScore).padStart(3, '0');

        // Input Setup - Arrow Keys / WASD
        window.addEventListener('keydown', (e) => {
            // Prevent viewport scrolling
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (isGameOver) {
                if (e.key === ' ' || e.key === 'Enter') {
                    startNewGame();
                }
                return;
            }

            if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
                togglePause();
                return;
            }

            const movingUp = dy === -gridSize;
            const movingDown = dy === gridSize;
            const movingRight = dx === gridSize;
            const movingLeft = dx === -gridSize;

            switch (e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (!movingRight) { nextDx = -gridSize; nextDy = 0; }
                    break;
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (!movingDown) { nextDx = 0; nextDy = -gridSize; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (!movingLeft) { nextDx = gridSize; nextDy = 0; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (!movingUp) { nextDx = 0; nextDy = gridSize; }
                    break;
            }
        });

        // Setup Touch Screen Controls (V-Pad)
        function initMobileControls() {
            const bindControl = (elId, action) => {
                const el = document.getElementById(elId);
                const triggerAction = (e) => {
                    e.preventDefault();
                    if (isGameOver) return;
                    playSound('click');
                    action();
                };
                el.addEventListener('touchstart', triggerAction, { passive: false });
                el.addEventListener('mousedown', triggerAction);
            };

            bindControl('btnUp', () => {
                if (dy !== gridSize) { nextDx = 0; nextDy = -gridSize; }
            });
            bindControl('btnDown', () => {
                if (dy !== -gridSize) { nextDx = 0; nextDy = gridSize; }
            });
            bindControl('btnLeft', () => {
                if (dx !== gridSize) { nextDx = -gridSize; nextDy = 0; }
            });
            bindControl('btnRight', () => {
                if (dx !== -gridSize) { nextDx = gridSize; nextDy = 0; }
            });
        }
        initMobileControls();

        // Game Setup Button Event
        startBtn.addEventListener('click', () => {
            initAudio();
            playSound('click');
            if (isGameOver) {
                startNewGame();
            } else if (isPaused) {
                togglePause();
            }
        });

        function startNewGame() {
            snake = [
                { x: gridSize * 5, y: gridSize * 10 },
                { x: gridSize * 4, y: gridSize * 10 },
                { x: gridSize * 3, y: gridSize * 10 }
            ];
            dx = gridSize;
            dy = 0;
            nextDx = gridSize;
            nextDy = 0;
            score = 0;
            gameSpeed = 120;
            superFood = null;
            particles = [];
            scoreEl.innerText = '000';
            spawnFood();
            isGameOver = false;
            isPaused = false;
            overlay.style.display = 'none';
            lastTime = performance.now();
            requestAnimationFrame(mainGameLoop);
        }

        function togglePause() {
            isPaused = !isPaused;
            if (isPaused) {
                overlayTitle.innerText = 'PAUSED';
                startBtn.innerText = 'RESUME';
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
                lastTime = performance.now();
                requestAnimationFrame(mainGameLoop);
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            playSound('die');
            overlayTitle.innerHTML = 'GAME OVER<br><span style="font-size: 11px; color:#ff3366;">SCORE: ' + score + '</span>';
            startBtn.innerText = 'TRY AGAIN';
            overlay.style.display = 'flex';

            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snake_high', highScore);
                highScoreEl.innerText = String(highScore).padStart(3, '0');
            }
        }

        // Spawn food mechanics
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount) * gridSize;
                food.y = Math.floor(Math.random() * tileCount) * gridSize;
                
                // Ensure spawn isn't on top of the Snake body
                valid = true;
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        valid = false;
                        break;
                    }
                }
            }

            // Occassional Special golden star food spawning (20% chance)
            if (Math.random() < 0.20 && !superFood) {
                spawnSuperFood();
            }
        }

        function spawnSuperFood() {
            let valid = false;
            let sx, sy;
            while (!valid) {
                sx = Math.floor(Math.random() * tileCount) * gridSize;
                sy = Math.floor(Math.random() * tileCount) * gridSize;
                
                valid = true;
                // Avoid overlapping normal food or body
                if (sx === food.x && sy === food.y) valid = false;
                for (let part of snake) {
                    if (part.x === sx && part.y === sy) {
                        valid = false;
                        break;
                    }
                }
            }
            superFood = { x: sx, y: sy };
            superFoodTimer = 50; // Dynamic expiry timer
        }

        // Particle System Visuals
        function spawnParticles(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x + gridSize / 2,
                    y: y + gridSize / 2,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 3 + 1,
                    alpha: 1,
                    decay: Math.random() * 0.05 + 0.02,
                    color: color
                });
            }
        }

        function updateAndDrawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                } else {
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }

        // Core Game Engine Frame loops
        function mainGameLoop(timestamp) {
            if (isGameOver || isPaused) return;

            requestAnimationFrame(mainGameLoop);

            const elapsed = timestamp - lastTime;
            if (elapsed >= gameSpeed) {
                lastTime = timestamp - (elapsed % gameSpeed);
                updatePhysicsState();
                renderScene();
            }
        }

        // Handle physical movements and boundaries
        function updatePhysicsState() {
            // Commit requested turn direction
            dx = nextDx;
            dy = nextDy;

            // Generate next head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Grid edge collisions
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                triggerGameOver();
                return;
            }

            // Body Self collision check
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    triggerGameOver();
                    return;
                }
            }

            // Place new head element
            snake.unshift(head);

            // Handle Eating Logic
            const ateRegularFood = head.x === food.x && head.y === food.y;
            const ateSuperFood = superFood && head.x === superFood.x && head.y === superFood.y;

            if (ateRegularFood) {
                score += 10;
                scoreEl.innerText = String(score).padStart(3, '0');
                playSound('eat');
                spawnParticles(food.x, food.y, '#ff3366');
                spawnFood();
                // Gradually speed up snake to raise difficulty
                if (gameSpeed > 60) {
                    gameSpeed -= 2;
                }
            } else if (ateSuperFood) {
                score += 30;
                scoreEl.innerText = String(score).padStart(3, '0');
                playSound('superEat');
                spawnParticles(superFood.x, superFood.y, '#ffd700');
                superFood = null;
            } else {
                // If didn't eat, drop tail segment to simulate normal movement
                snake.pop();
            }

            // Count down super-food visual timing
            if (superFood) {
                superFoodTimer--;
                if (superFoodTimer <= 0) {
                    superFood = null;
                }
            }
        }

        // Visual Presentation Frame render
        function renderScene() {
            // Draw clean background block
            ctx.fillStyle = '#060610';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Subtle Cyberpunk Grid Background Lines
            ctx.strokeStyle = '#0f1025';
            ctx.lineWidth = 1;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw Regular Food Target (Glow neon pink circle)
            ctx.save();
            ctx.shadowColor = '#ff3366';
            ctx.shadowBlur = 10;
            ctx.fillStyle = '#ff3366';
            ctx.beginPath();
            ctx.arc(food.x + gridSize / 2, food.y + gridSize / 2, gridSize / 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Draw Bonus/Super Food (Shimmering Golden Core)
            if (superFood) {
                ctx.save();
                const scalePulse = Math.sin(Date.now() / 100) * 1.5 + 4;
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 15;
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(superFood.x + gridSize / 2, superFood.y + gridSize / 2, scalePulse, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Render Entire Snake Geometry
            snake.forEach((part, index) => {
                const isHead = index === 0;
                ctx.save();

                // Dynamic body styling (Cyan head transitioning to Cyber-green tail)
                if (isHead) {
                    ctx.fillStyle = '#00ffcc';
                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 12;
                } else {
                    const ratio = index / snake.length;
                    ctx.fillStyle = `rgb(0, ${Math.floor(255 - (ratio * 120))}, ${Math.floor(204 - (ratio * 100))})`;
                    ctx.shadowColor = '#00aa88';
                    ctx.shadowBlur = 4;
                }

                // Smooth rounded corners representation
                const gap = 1;
                const r = 4;
                const x = part.x + gap;
                const y = part.y + gap;
                const w = gridSize - gap * 2;
                const h = gridSize - gap * 2;

                ctx.beginPath();
                if (ctx.roundRect) {
                    ctx.roundRect(x, y, w, h, r);
                } else {
                    ctx.rect(x, y, w, h);
                }
                ctx.fill();

                // Draw expressive Eyes onto the Head depending on input direction vector
                if (isHead) {
                    ctx.fillStyle = '#05050a';
                    ctx.shadowBlur = 0; // Turn off light emission inside eyes
                    let e1 = { x: 0, y: 0 };
                    let e2 = { x: 0, y: 0 };

                    if (dx > 0) { // Moving East
                        e1 = { x: x + w - 4, y: y + 4 };
                        e2 = { x: x + w - 4, y: y + h - 6 };
                    } else if (dx < 0) { // Moving West
                        e1 = { x: x + 4, y: y + 4 };
                        e2 = { x: x + 4, y: y + h - 6 };
                    } else if (dy > 0) { // Moving South
                        e1 = { x: x + 4, y: y + h - 4 };
                        e2 = { x: x + w - 6, y: y + h - 4 };
                    } else if (dy < 0) { // Moving North
                        e1 = { x: x + 4, y: y + 4 };
                        e2 = { x: x + w - 6, y: y + 4 };
                    }

                    ctx.beginPath();
                    ctx.arc(e1.x, e1.y, 1.8, 0, Math.PI * 2);
                    ctx.arc(e2.x, e2.y, 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            });

            // Run explosion effects
            updateAndDrawParticles();
        }

        // Initial setup screen
        ctx.fillStyle = '#060610';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
