<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binomial Expander</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --accent: #00f2ff;
            --text: #e1e1e6;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .nav { position: fixed; top: 20px; left: 20px; }
        a { color: var(--accent); text-decoration: none; font-size: 0.9rem; opacity: 0.7; }
        .container { width: 100%; max-width: 800px; margin-top: 60px; text-align: center; }
        h1 { font-weight: 700; letter-spacing: -1px; margin-bottom: 2rem; }
        .controls { background: var(--panel); padding: 2rem; border-radius: 12px; border: 1px solid #333; margin-bottom: 2rem; }
        input { background: #000; border: 1px solid var(--accent); color: white; padding: 10px; width: 60px; border-radius: 4px; text-align: center; }
        #triangle { display: flex; flex-direction: column; align-items: center; gap: 10px; overflow-x: auto; padding-bottom: 20px; }
        .row { display: flex; justify-content: center; gap: 10px; }
        .cell { width: 40px; height: 40px; background: var(--panel); border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; border-radius: 4px; transition: 0.3s; }
        .cell:hover { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

<div class="nav"><a href="../index.html">← /grow</a></div>

<div class="container">
    <h1>Binomial Expander</h1>
    <div class="controls">
        <label>Rows (n): </label>
        <input type="number" id="rows" value="6" min="1" max="15" oninput="render()">
    </div>
    <div id="triangle"></div>
</div>

<script>
    function factorial(n) {
        return n <= 1 ? 1 : n * factorial(n - 1);
    }

    function nCr(n, r) {
        return Math.round(factorial(n) / (factorial(r) * factorial(n - r)));
    }

    function render() {
        const n = document.getElementById('rows').value;
        const container = document.getElementById('triangle');
        container.innerHTML = '';
        
        for (let i = 0; i < n; i++) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row';
            for (let j = 0; j <= i; j++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = nCr(i, j);
                cell.title = `(${i} choose ${j}) = ${nCr(i, j)}`;
                rowDiv.appendChild(cell);
            }
            container.appendChild(rowDiv);
        }
    }
    render();
</script>

</body>
</html>
