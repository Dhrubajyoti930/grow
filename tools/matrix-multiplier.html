<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Multiplier</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --accent: #00ff9d; --dim: #333; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Mono', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        a { color: var(--accent); text-decoration: none; font-size: 0.8rem; position: absolute; top: 20px; left: 20px; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        .matrices { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin: 40px 0; }
        .matrix { display: grid; gap: 8px; padding: 15px; background: #16161a; border: 1px solid #222; border-radius: 4px; }
        .cell { width: 40px; height: 40px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; transition: 0.3s; background: #000; }
        .cell.active { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(0,255,157,0.2); }
        .cell.highlight { background: #1a2a22; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px 20px; cursor: pointer; font-family: inherit; transition: 0.3s; }
        button:hover { background: var(--accent); color: #000; }
        #step-info { margin: 20px; min-height: 1.5em; color: var(--accent); }
    </style>
</head>
<body>
    <a href="../index.html">← /grow</a>
    <div class="container">
        <h1>Matrix Multiplier</h1>
        <div id="step-info">Press 'Start' to visualize multiplication.</div>
        <div class="matrices">
            <div id="m1" class="matrix"></div>
            <div style="font-size: 2rem; align-self: center;">×</div>
            <div id="m2" class="matrix"></div>
            <div style="font-size: 2rem; align-self: center;">=</div>
            <div id="m3" class="matrix"></div>
        </div>
        <div class="controls">
            <button onclick="startVisualizer()">Start</button>
            <button onclick="reset()">Reset</button>
        </div>
    </div>

    <script>
        const matA = [[1, 2], [3, 4]];
        const matB = [[5, 6], [7, 8]];
        const matC = [[0, 0], [0, 0]];
        let step = 0;

        function render() {
            ['m1', 'm2', 'm3'].forEach((id, idx) => {
                const m = [matA, matB, matC][idx];
                const el = document.getElementById(id);
                el.style.gridTemplateColumns = `repeat(${m[0].length}, 40px)`;
                el.innerHTML = m.map((row, i) => row.map((val, j) => 
                    `<div class="cell" id="c${idx}-${i}-${j}">${val}</div>`).join('')).join('');
            });
        }

        async function startVisualizer() {
            const info = document.getElementById('step-info');
            for (let i = 0; i < 2; i++) {
                for (let j = 0; j < 2; j++) {
                    let sum = 0;
                    for (let k = 0; k < 2; k++) {
                        info.innerText = `Row ${i} dipping into Column ${j}: ${matA[i][k]} * ${matB[k][j]}`;
                        document.getElementById(`c0-${i}-${k}`).classList.add('active');
                        document.getElementById(`c1-${k}-${j}`).classList.add('active');
                        await new Promise(r => setTimeout(r, 800));
                        sum += matA[i][k] * matB[k][j];
                        document.getElementById(`c0-${i}-${k}`).classList.remove('active');
                        document.getElementById(`c1-${k}-${j}`).classList.remove('active');
                    }
                    matC[i][j] = sum;
                    document.getElementById(`c2-${i}-${j}`).innerText = sum;
                    document.getElementById(`c2-${i}-${j}`).classList.add('active');
                }
            }
            info.innerText = "Multiplication Complete.";
        }

        function reset() {
            matC.forEach((r, i) => r.forEach((_, j) => matC[i][j] = 0));
            document.getElementById('step-info').innerText = "Press 'Start' to visualize.";
            render();
        }

        render();
    </script>
</body>
</html>
