<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riemann Sums Calc</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --accent: #00ff9d;
            --text: #e0e0e0;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--panel);
            padding: 2rem;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 40px;
        }
        canvas {
            width: 100%;
            height: 300px;
            background: #000;
            image-rendering: pixelated;
            border: 2px solid #222;
        }
        .controls {
            margin-top: 2rem;
            display: grid;
            gap: 1rem;
        }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--accent);
        }
        h1 { margin-top: 0; font-size: 1.5rem; letter-spacing: -1px; }
    </style>
</head>
<body>

    <a href="../index.html" class="back-link">← /grow</a>

    <div class="container">
        <h1>Riemann Sums Calc</h1>
        <canvas id="canvas"></canvas>
        <div class="controls">
            <label>Intervals: <span id="n-val">20</span></label>
            <input type="range" id="n-slider" min="2" max="100" value="20">
            <div class="stats">
                <span>Sum Area: <span id="area-val">0.00</span></span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('n-slider');
        const nVal = document.getElementById('n-val');
        const areaVal = document.getElementById('area-val');

        function draw() {
            const n = parseInt(slider.value);
            nVal.textContent = n;
            
            const w = canvas.width = canvas.offsetWidth * 2;
            const h = canvas.height = canvas.offsetHeight * 2;
            
            ctx.clearRect(0, 0, w, h);
            
            const func = x => (Math.sin(x) + 1.2) * (h / 3);
            const dx = w / n;
            let totalArea = 0;

            // Draw curve
            ctx.beginPath();
            ctx.strokeStyle = '#555';
            ctx.lineWidth = 4;
            for(let x=0; x<w; x++) ctx.lineTo(x, h - func(x/w * Math.PI * 2));
            ctx.stroke();

            // Draw rectangles
            ctx.fillStyle = 'rgba(0, 255, 157, 0.2)';
            ctx.strokeStyle = '#00ff9d';
            for(let i=0; i<n; i++) {
                const x = i * dx;
                const y = h - func(x/w * Math.PI * 2);
                ctx.fillRect(x, y, dx, h - y);
                ctx.strokeRect(x, y, dx, h - y);
                totalArea += (func(x/w * Math.PI * 2) / h) * (1/n);
            }
            areaVal.textContent = totalArea.toFixed(4);
        }

        slider.addEventListener('input', draw);
        window.addEventListener('resize', draw);
        draw();
    </script>
</body>
</html>
