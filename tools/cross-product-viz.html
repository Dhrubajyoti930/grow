<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cross Product Viz</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --accent: #00f2ff;
            --text: #e0e0e0;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        a { color: var(--accent); text-decoration: none; font-size: 0.9rem; pointer-events: auto; }
        .controls { position: absolute; bottom: 20px; left: 20px; background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid #333; pointer-events: auto; }
        canvas { display: block; cursor: crosshair; }
        .val { color: var(--accent); font-weight: bold; }
        h1 { margin: 0 0 10px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="ui">
    <a href="../index.html">← /grow</a>
    <h1>Cross Product Viz</h1>
    <div id="stats">Area: <span id="area" class="val">0.00</span></div>
</div>

<div class="controls">
    <div>Drag handles to adjust vectors A and B</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const areaEl = document.getElementById('area');

    let w, h;
    let vA = { x: 100, y: -50 };
    let vB = { x: 50, y: 150 };
    let dragging = null;

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, w, h);

        const ox = w / 2;
        const oy = h / 2;

        const ax = ox + vA.x, ay = oy + vA.y;
        const bx = ox + vB.x, by = oy + vB.y;
        const cx = ax + vB.x, cy = ay + vB.y;

        // Parallelogram
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.lineTo(ax, ay);
        ctx.lineTo(cx, cy);
        ctx.lineTo(bx, by);
        ctx.closePath();
        ctx.fillStyle = 'rgba(0, 242, 255, 0.15)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 242, 255, 0.5)';
        ctx.stroke();

        // Vectors
        drawVec(ox, oy, ax, ay, '#ffffff');
        drawVec(ox, oy, bx, by, '#ff007a');

        const area = Math.abs(vA.x * vB.y - vA.y * vB.x) / 100;
        areaEl.innerText = area.toFixed(2);

        requestAnimationFrame(draw);
    }

    function drawVec(sx, sy, ex, ey, color) {
        ctx.beginPath();
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.moveTo(sx, sy);
        ctx.lineTo(ex, ey);
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(ex, ey, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', e => {
        const dxA = e.clientX - (w/2 + vA.x), dyA = e.clientY - (h/2 + vA.y);
        const dxB = e.clientX - (w/2 + vB.x), dyB = e.clientY - (h/2 + vB.y);
        if (Math.hypot(dxA, dyA) < 20) dragging = 'A';
        else if (Math.hypot(dxB, dyB) < 20) dragging = 'B';
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        if (dragging === 'A') { vA.x = e.clientX - w/2; vA.y = e.clientY - h/2; }
        else { vB.x = e.clientX - w/2; vB.y = e.clientY - h/2; }
    });

    window.addEventListener('mouseup', () => dragging = null);
    draw();
</script>
</body>
</html>
