<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dot Product Projector</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00f2ff;
            --panel: #16161a;
            --text: #e0e0e0;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--panel);
            padding: 30px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            margin-top: 50px;
        }
        canvas {
            width: 100%;
            height: 300px;
            background: #000;
            cursor: crosshair;
            border: 1px solid #444;
            image-rendering: pixelated;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            gap: 15px;
        }
        .val { color: var(--accent); font-weight: bold; }
        .info { font-size: 0.9rem; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>

<a href="../index.html" class="back-link">← /grow</a>

<div class="container">
    <h2>Vector Projection</h2>
    <canvas id="canvas"></canvas>
    <div class="controls">
        <div>Vector A (Blue): <span id="valA" class="val">0, 0</span></div>
        <div>Vector B (Red): <span id="valB" class="val">0, 0</span></div>
        <div>Scalar Projection: <span id="valProj" class="val">0</span></div>
    </div>
    <div class="info">Drag points A and B to visualize projection.</div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let A = {x: 100, y: 100};
    let B = {x: 200, y: 50};
    let dragging = null;

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;

        const vA = {x: A.x - cx, y: -(A.y - cy)};
        const vB = {x: B.x - cx, y: -(B.y - cy)};
        
        const dot = vA.x * vB.x + vA.y * vB.y;
        const magB = Math.sqrt(vB.x * vB.x + vB.y * vB.y);
        const proj = magB === 0 ? 0 : dot / magB;

        // Draw Axes
        ctx.strokeStyle = '#222';
        ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(canvas.width, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();

        // Draw B (Base)
        ctx.strokeStyle = '#ff4d4d'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(B.x, B.y); ctx.stroke();

        // Draw A
        ctx.strokeStyle = '#00f2ff';
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(A.x, A.y); ctx.stroke();

        // Draw Projection
        if(magB > 0) {
            const unitB = {x: vB.x / magB, y: vB.y / magB};
            const p = {x: unitB.x * proj, y: unitB.y * proj};
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#555';
            ctx.beginPath(); ctx.moveTo(A.x, A.y); ctx.lineTo(cx + p.x, cy - p.y); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(cx + p.x, cy - p.y, 4, 0, Math.PI*2); ctx.fill();
        }

        // Draw Handles
        ctx.fillStyle = '#00f2ff'; ctx.beginPath(); ctx.arc(A.x, A.y, 6, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ff4d4d'; ctx.beginPath(); ctx.arc(B.x, B.y, 6, 0, Math.PI*2); ctx.fill();

        document.getElementById('valA').textContent = `${Math.round(vA.x)}, ${Math.round(vA.y)}`;
        document.getElementById('valB').textContent = `${Math.round(vB.x)}, ${Math.round(vB.y)}`;
        document.getElementById('valProj').textContent = proj.toFixed(2);
    }

    canvas.onmousedown = e => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        if(Math.hypot(x-A.x, y-A.y) < 20) dragging = 'A';
        else if(Math.hypot(x-B.x, y-B.y) < 20) dragging = 'B';
    };

    window.onmousemove = e => {
        if(!dragging) return;
        const rect = canvas.getBoundingClientRect();
        if(dragging === 'A') { A.x = e.clientX - rect.left; A.y = e.clientY - rect.top; }
        else { B.x = e.clientX - rect.left; B.y = e.clientY - rect.top; }
        draw();
    };

    window.onmouseup = () => dragging = null;
    draw();
</script>
</body>
</html>
