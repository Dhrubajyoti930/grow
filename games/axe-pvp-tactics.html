<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axe PvP Tactics</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161a;
            --accent: #f8312f;
            --shield: #3498db;
            --text: #e0e0e0;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: var(--panel);
            border: 2px solid #2a2a2f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            text-align: center;
        }
        .nav { position: absolute; top: 20px; left: 20px; }
        a { color: #666; text-decoration: none; font-family: 'Press Start 2P'; font-size: 10px; }
        h1 { font-family: 'Press Start 2P'; font-size: 14px; color: var(--accent); margin-bottom: 30px; }
        
        .meter-group { margin: 20px 0; }
        .label { font-size: 10px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .bar-bg { height: 12px; background: #000; border: 1px solid #333; position: relative; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s linear; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        button {
            padding: 15px;
            border: none;
            background: #222;
            color: #fff;
            font-family: 'Press Start 2P';
            font-size: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        #axe-btn { border-left: 4px solid var(--accent); }
        #shield-btn { border-left: 4px solid var(--shield); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        
        #log { font-size: 12px; height: 40px; margin-top: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="nav"><a href="../index.html">← /grow</a></div>
    
    <div id="game-container">
        <h1>AXE TACTICS</h1>
        
        <div class="meter-group">
            <span class="label">Axe Crit Cooldown</span>
            <div class="bar-bg"><div id="axe-bar" class="bar-fill" style="background: var(--accent);"></div></div>
        </div>
        
        <div class="meter-group">
            <span class="label">Shield Integrity</span>
            <div class="bar-bg"><div id="shield-bar" class="bar-fill" style="background: var(--shield); width: 100%;"></div></div>
        </div>

        <div class="controls">
            <button id="axe-btn">SWING AXE</button>
            <button id="shield-btn">BLOCK</button>
        </div>
        
        <div id="log">Ready to duel.</div>
    </div>

    <script>
        let axeCD = 0;
        let shield = 100;
        const axeBar = document.getElementById('axe-bar');
        const shieldBar = document.getElementById('shield-bar');
        const log = document.getElementById('log');
        const axeBtn = document.getElementById('axe-btn');
        const shieldBtn = document.getElementById('shield-btn');

        axeBtn.onclick = () => {
            if (axeCD > 0) return;
            axeCD = 100;
            log.innerText = "CRIT LANDED!";
            updateUI();
        };

        shieldBtn.onclick = () => {
            shield = Math.min(100, shield + 20);
            log.innerText = "Shield restored.";
            updateUI();
        };

        function updateUI() {
            axeBar.style.width = `${axeCD}%`;
            shieldBar.style.width = `${shield}%`;
            axeBtn.disabled = axeCD > 0;
        }

        setInterval(() => {
            if (axeCD > 0) {
                axeCD -= 2;
                updateUI();
            }
            if (Math.random() > 0.7) {
                shield = Math.max(0, shield - 1);
                updateUI();
            }
        }, 100);
    </script>
</body>
</html>
