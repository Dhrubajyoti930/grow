<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>End Crystal Bomber</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0a0a0c; color: #fff; font-family: 'Press Start 2P', cursive; overflow: hidden; touch-action: none; }
        #back-link { position: absolute; top: 15px; left: 15px; z-index: 100; color: #555; text-decoration: none; font-size: 10px; transition: color 0.3s; }
        #back-link:hover { color: #fff; }
        canvas { display: block; cursor: crosshair; }
        #ui { position: absolute; bottom: 20px; width: 100%; text-align: center; pointer-events: none; }
        .score { font-size: 14px; text-shadow: 2px 2px #ff00ff; }
    </style>
</head>
<body>
    <a id="back-link" href="../index.html">← /grow</a>
    <div id="ui"><div class="score" id="score">SCORE: 0</div></div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        
        let width, height, score = 0;
        let crystals = [];
        let explosions = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Crystal {
            constructor(x, y) {
                this.x = x; this.y = y; this.size = 20;
                this.pulse = 0;
            }
            draw() {
                this.pulse += 0.1;
                ctx.fillStyle = '#cc00ff';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size - Math.sin(this.pulse)*5);
                ctx.lineTo(this.x + this.size, this.y);
                ctx.lineTo(this.x, this.y + this.size + Math.sin(this.pulse)*5);
                ctx.lineTo(this.x - this.size, this.y);
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.stroke();
            }
        }

        class Explosion {
            constructor(x, y) {
                this.x = x; this.y = y; this.radius = 0; this.alpha = 1;
            }
            update() {
                this.radius += 5;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function spawn() {
            crystals.push(new Crystal(Math.random() * width, Math.random() * height));
            setTimeout(spawn, 2000);
        }

        window.addEventListener('mousedown', (e) => {
            explosions.push(new Explosion(e.clientX, e.clientY));
            crystals = crystals.filter(c => {
                const dist = Math.hypot(c.x - e.clientX, c.y - e.clientY);
                if(dist < 100) { score += 10; scoreEl.innerText = "SCORE: " + score; return false; }
                return true;
            });
        });

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            crystals.forEach(c => c.draw());
            explosions = explosions.filter(e => e.alpha > 0);
            explosions.forEach(e => { e.update(); e.draw(); });
            
            requestAnimationFrame(animate);
        }

        spawn();
        animate();
    </script>
</body>
</html>
