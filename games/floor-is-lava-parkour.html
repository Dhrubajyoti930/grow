<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Floor is Lava Parkour</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #0a0a0c; font-family: 'Press+Start+2P', cursive; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { border: 2px solid #333; image-rendering: pixelated; max-width: 100%; max-height: 100%; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; }
        a { color: #555; text-decoration: none; font-size: 12px; transition: 0.3s; }
        a:hover { color: #0ff; }
        #score { position: absolute; top: 20px; right: 20px; font-size: 14px; color: #0ff; }
    </style>
</head>
<body>
    <div id="ui"><a href="../index.html">← /grow</a></div>
    <div id="score">SCORE: 0</div>
    <div id="game-container">
        <canvas id="game"></canvas>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 600;

    let score = 0;
    let gameActive = true;
    const player = { x: 200, y: 500, w: 20, h: 20, vy: 0, vx: 0, grounded: false };
    const platforms = [];
    let speed = 2;

    function createPlatform(y) {
        return { x: Math.random() * (canvas.width - 60), y: y, w: 60, h: 10, life: 100 };
    }

    for (let i = 0; i < 6; i++) platforms.push(createPlatform(i * 120));

    function update() {
        if (!gameActive) return;

        player.vy += 0.5;
        player.y += player.vy;
        player.x += player.vx;

        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

        player.grounded = false;
        platforms.forEach(p => {
            if (player.vy > 0 && player.x + player.w > p.x && player.x < p.x + p.w && 
                player.y + player.h > p.y && player.y + player.h < p.y + p.h + player.vy) {
                player.vy = -10;
                player.grounded = true;
                p.life -= 20;
            }
            p.y += speed;
            if (p.y > canvas.height) {
                platforms.splice(platforms.indexOf(p), 1);
                platforms.push(createPlatform(0));
                score++;
                scoreEl.innerText = "SCORE: " + score;
            }
        });

        if (player.y > canvas.height) gameActive = false;
    }

    function draw() {
        ctx.fillStyle = '#0a0a0c';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#0ff';
        ctx.fillRect(player.x, player.y, player.w, player.h);

        platforms.forEach(p => {
            ctx.fillStyle = p.life > 60 ? '#4f4' : p.life > 30 ? '#fa0' : '#f00';
            ctx.fillRect(p.x, p.y, p.w, p.h);
        });

        if (!gameActive) {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = '#fff';
            ctx.fillText("GAME OVER", 120, 300);
        }
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => {
        if(e.key === 'ArrowLeft') player.vx = -5;
        if(e.key === 'ArrowRight') player.vx = 5;
    });
    window.addEventListener('keyup', () => player.vx = 0);
    window.addEventListener('touchstart', e => {
        player.vx = (e.touches[0].clientX > canvas.width/2) ? 5 : -5;
    });
    window.addEventListener('touchend', () => player.vx = 0);

    loop();
</script>
</body>
</html>
