<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closed Timelike Curve</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #00ffcc;
            --text: #d1d1d1;
            --panel: #16161a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #app {
            max-width: 600px;
            width: 90%;
            padding: 2rem;
            background: var(--panel);
            border-left: 4px solid var(--accent);
            box-shadow: 20px 20px 60px #050505;
        }
        .nav {
            font-size: 0.8rem;
            margin-bottom: 2rem;
            letter-spacing: 2px;
        }
        a { color: var(--accent); text-decoration: none; opacity: 0.7; }
        a:hover { opacity: 1; }
        h1 { font-family: 'Courier Prime', monospace; color: var(--accent); margin: 0; }
        .story { line-height: 1.6; margin-top: 2rem; }
        #canvas-container {
            width: 100%;
            height: 150px;
            background: #000;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid #333;
        }
        .pixel-art {
            image-rendering: pixelated;
            width: 64px;
            height: 64px;
            background: var(--accent);
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        button {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }
        button:hover { background: var(--accent); color: var(--bg); }
    </style>
</head>
<body>

<div id="app">
    <div class="nav"><a href="../index.html">← /grow</a></div>
    <h1>Closed Timelike Curve</h1>
    
    <div id="canvas-container" onclick="nextPhase()">
        <div class="pixel-art" id="box"></div>
    </div>

    <div id="text-node" class="story">
        General Relativity doesn't forbid time travel. It allows for "Closed Timelike Curves"—paths through spacetime that return to their own origin.
    </div>
    
    <button onclick="nextPhase()">Contemplate Spacetime</button>
</div>

<script>
    const states = [
        "Imagine a cylinder of infinite length, spinning so fast it drags spacetime with it. This is the Tipler Cylinder.",
        "Einstein's field equations define gravity as the curvature of geometry. If gravity is strong enough, the geometry loops back on itself.",
        "You step into the loop. You are moving forward in your own time, but you are traversing a circle in the fabric of the universe.",
        "You arrive at your starting point. You are a paradox, a self-consistent calculation in a relativistic loop. Logic holds, even if causality falters."
    ];
    let index = 0;
    const textNode = document.getElementById('text-node');
    const box = document.getElementById('box');

    function nextPhase() {
        index = (index + 1) % states.length;
        textNode.innerText = states[index];
        box.style.borderRadius = index % 2 === 0 ? "0%" : "50%";
        box.style.transform = `rotate(${index * 90}deg)`;
    }
</script>

</body>
</html>
