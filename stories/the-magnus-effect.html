<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Magnus Effect</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --text: #e0e0e0; --accent: #00f2ff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        #app { max-width: 600px; margin: 0 auto; padding: 2rem; min-height: 100vh; display: flex; flex-direction: column; }
        .back-link { font-family: 'JetBrains Mono', monospace; color: var(--accent); text-decoration: none; font-size: 0.8rem; margin-bottom: 2rem; display: block; opacity: 0.7; }
        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 2rem; border-left: 2px solid var(--accent); padding-left: 1rem; }
        #scene { height: 300px; border: 1px solid #333; position: relative; background: #111; overflow: hidden; margin-bottom: 2rem; cursor: pointer; }
        #ball { width: 40px; height: 40px; background: radial-gradient(circle at 10px 10px, #ff8c00, #b35e00); border-radius: 50%; position: absolute; left: 50%; top: 20px; box-shadow: 0 0 20px rgba(255,140,0,0.3); }
        .controls { display: flex; gap: 1rem; align-items: center; }
        button { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 0.5rem 1rem; cursor: pointer; font-family: 'JetBrains Mono'; transition: 0.3s; }
        button:hover { background: var(--accent); color: black; }
        #log { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; line-height: 1.6; color: #888; }
        .pixel-art { image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="app">
        <a href="../index.html" class="back-link">← /grow</a>
        <h1>The Magnus Effect</h1>
        
        <div id="scene">
            <div id="ball"></div>
        </div>

        <div class="controls">
            <button onclick="dropBall()">DROP BALL</button>
            <label><input type="checkbox" id="spin"> Add Backspin</label>
        </div>

        <div id="log">Adjust settings and drop the ball from the dam crest.</div>
    </div>

    <script>
        const ball = document.getElementById('ball');
        const log = document.getElementById('log');
        const spinInput = document.getElementById('spin');
        let falling = false;

        function dropBall() {
            if (falling) return;
            falling = true;
            let pos = 20;
            let horizontal = 0;
            let velocity = 0;
            const spin = spinInput.checked;

            log.innerText = spin ? "Dropping with backspin... watch the arc!" : "Dropping ball with no spin...";

            const interval = setInterval(() => {
                velocity += 0.5;
                pos += velocity;
                
                if (spin) {
                    horizontal -= 0.8; 
                }

                ball.style.top = pos + 'px';
                ball.style.left = `calc(50% + ${horizontal}px)`;

                if (pos > 250) {
                    clearInterval(interval);
                    falling = false;
                    log.innerText = spin 
                        ? "The Magnus force pushed the ball back toward the dam wall!" 
                        : "The ball fell straight down due to gravity.";
                }
            }, 30);
        }
    </script>
</body>
</html>
