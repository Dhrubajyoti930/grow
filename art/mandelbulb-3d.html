<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mandelbulb 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050505; font-family: 'Space Grotesk', sans-serif; color: #fff; }
        #canvas { width: 100vw; height: 100vh; display: block; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .back-link { display: inline-block; pointer-events: auto; text-decoration: none; color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; transition: color 0.3s; }
        .back-link:hover { color: #fff; }
        h1 { margin: 0; font-weight: 300; font-size: 24px; letter-spacing: 4px; pointer-events: auto; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .controls { position: absolute; bottom: 20px; left: 20px; color: #444; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="ui">
        <a href="../index.html" class="back-link">← /grow</a>
        <h1>MANDELBULB</h1>
    </div>
    <div class="controls">Drag to orbit • Scroll to zoom</div>
    <canvas id="canvas"></canvas>

    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform vec2 u_res;
        uniform float u_time;
        uniform vec2 u_mouse;

        #define MAX_STEPS 64
        #define DIST_TOL 0.001
        #define POWER 8.0

        float map(vec3 p) {
            vec3 z = p;
            float dr = 1.0;
            float r = 0.0;
            for (int i = 0; i < 6; i++) {
                r = length(z);
                if (r > 2.0) break;
                float theta = acos(z.z / r);
                float phi = atan(z.y, z.x);
                dr = pow(r, POWER - 1.0) * POWER * dr + 1.0;
                float zr = pow(r, POWER);
                theta *= POWER;
                phi *= POWER;
                z = zr * vec3(sin(theta) * cos(phi), sin(phi) * sin(theta), cos(theta));
                z += p;
            }
            return 0.5 * log(r) * r / dr;
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res.xy) / u_res.y;
            vec3 ro = vec3(0, 0, -3.0);
            float yaw = u_mouse.x * 6.28;
            float pitch = u_mouse.y * 3.14;
            mat3 rot = mat3(cos(yaw), 0, sin(yaw), 0, 1, 0, -sin(yaw), 0, cos(yaw)) * 
                       mat3(1, 0, 0, 0, cos(pitch), -sin(pitch), 0, sin(pitch), cos(pitch));
            vec3 rd = rot * normalize(vec3(uv, 1.2));
            
            float t = 0.0;
            float d;
            for(int i = 0; i < MAX_STEPS; i++) {
                d = map(ro + rd * t);
                if(abs(d) < DIST_TOL || t > 5.0) break;
                t += d * 0.5;
            }
            
            vec3 color = vec3(0.0);
            if(t < 5.0) {
                float intensity = 1.0 - (t / 5.0);
                color = vec3(0.1, 0.4, 0.8) * intensity + vec3(0.8, 0.2, 0.5) * (1.0 - intensity);
            }
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        const canvas = document.getElementById('canvas');
        const gl = canvas.getContext('webgl');
        const vs = `attribute vec2 p; void main() { gl_Position = vec4(p, 0, 1); }`;
        const fs = document.getElementById('fs').text;
        
        function createShader(gl, type, source) {
            const s = gl.createShader(type);
            gl.shaderSource(s, source);
            gl.compileShader(s);
            return s;
        }

        const program = gl.createProgram();
        gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vs));
        gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(program);
        gl.useProgram(program);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const pos = gl.getAttribLocation(program, "p");
        gl.enableVertexAttribArray(pos);
        gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);

        let mouse = {x: 0.2, y: 0.2};
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX / window.innerWidth;
            mouse.y = e.clientY / window.innerHeight;
        });

        function render(time) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gl.viewport(0, 0, canvas.width, canvas.height);
            gl.uniform2f(gl.getUniformLocation(program, "u_res"), canvas.width, canvas.height);
            gl.uniform1f(gl.getUniformLocation(program, "u_time"), time * 0.001);
            gl.uniform2f(gl.getUniformLocation(program, "u_mouse"), mouse.x, mouse.y);
            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    </script>
</body>
</html>
