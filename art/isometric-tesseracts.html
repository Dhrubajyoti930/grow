<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isometric Tesseracts</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #0a0a0c;
            color: #d1d1d1;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #555;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
            z-index: 10;
        }
        #back-link:hover { color: #fff; }
        canvas {
            image-rendering: pixelated;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-link">← /grow</a>
    <canvas id="canvas"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, angle = 0;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // 4D Rotation logic
        function rotateTesseract(x, y, z, w, angle) {
            let s = Math.sin(angle), c = Math.cos(angle);
            // Rotate in XW plane
            let nx = x * c - w * s;
            let nw = x * s + w * c;
            return [nx, y, z, nw];
        }

        function project(x, y, z, w) {
            let factor = 1 / (2 - w);
            return [
                (x * factor * 200) + width / 2,
                (y * factor * 200) + height / 2
            ];
        }

        const vertices = [];
        for (let i = 0; i < 16; i++) {
            vertices.push([
                (i & 1 ? 1 : -1),
                (i & 2 ? 1 : -1),
                (i & 4 ? 1 : -1),
                (i & 8 ? 1 : -1)
            ]);
        }

        const edges = [];
        for (let i = 0; i < 16; i++) {
            for (let j = i + 1; j < 16; j++) {
                let diff = 0;
                for (let k = 0; k < 4; k++) if (((i >> k) & 1) !== ((j >> k) & 1)) diff++;
                if (diff === 1) edges.push([i, j]);
            }
        }

        function draw() {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, width, height);
            
            angle += 0.02;
            const pts = vertices.map(v => rotateTesseract(...v, angle));

            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            edges.forEach(([a, b]) => {
                let [x1, y1] = project(...pts[a]);
                let [x2, y2] = project(...pts[b]);
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
            });
            ctx.stroke();
            
            ctx.fillStyle = '#ff007a';
            pts.forEach(p => {
                let [px, py] = project(...p);
                ctx.beginPath();
                ctx.arc(px, py, 2, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
