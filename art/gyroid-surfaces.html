<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyroid Surfaces</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --accent: #00ffcc; --text: #e0e0e0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Space Grotesk', sans-serif; color: var(--text); }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .ui { position: relative; z-index: 10; padding: 2rem; pointer-events: none; }
        .back-link { position: absolute; top: 1rem; left: 1rem; color: var(--accent); text-decoration: none; font-size: 0.9rem; pointer-events: auto; text-transform: uppercase; letter-spacing: 0.1em; }
        .info { position: absolute; bottom: 2rem; left: 2rem; max-width: 300px; pointer-events: auto; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); padding: 1.5rem; border-left: 2px solid var(--accent); }
        h1 { margin: 0 0 0.5rem 0; font-size: 1.5rem; letter-spacing: -0.02em; }
        p { font-size: 0.85rem; line-height: 1.6; opacity: 0.8; }
        canvas { display: block; }
    </style>
</head>
<body>

<div class="ui">
    <a href="../index.html" class="back-link">← /grow</a>
    <div class="info">
        <h1>Gyroid</h1>
        <p>A triply periodic minimal surface. Infinite, non-self-intersecting, and perfectly balanced. Click and drag to navigate the manifold.</p>
    </div>
</div>

<div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.132.2/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const geometry = new THREE.BufferGeometry();
    const size = 30;
    const points = [];
    const step = 0.5;

    // Gyroid implicit function: sin(x)cos(y) + sin(y)cos(z) + sin(z)cos(x) = 0
    function isInside(x, y, z) {
        return Math.sin(x) * Math.cos(y) + Math.sin(y) * Math.cos(z) + Math.sin(z) * Math.cos(x);
    }

    const material = new THREE.MeshPhongMaterial({ 
        color: 0x00ffcc, 
        wireframe: true, 
        transparent: true, 
        opacity: 0.4,
        side: THREE.DoubleSide 
    });

    // Create Marching Cubes grid or simple point cloud representation
    const group = new THREE.Group();
    for (let x = -size; x < size; x += 1.5) {
        for (let y = -size; y < size; y += 1.5) {
            for (let z = -size; z < size; z += 1.5) {
                if (Math.abs(isInside(x/5, y/5, z/5)) < 0.2) {
                    const geo = new THREE.SphereGeometry(0.4, 8, 8);
                    const mesh = new THREE.Mesh(geo, material);
                    mesh.position.set(x, y, z);
                    group.add(mesh);
                }
            }
        }
    }
    scene.add(group);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(1, 1, 1);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x444444));

    camera.position.z = 50;
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.autoRotate = true;

    function animate() {
        requestAnimationFrame(animate);
        group.rotation.x += 0.002;
        group.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
