<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Ratio Spirals</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --accent: #d4af37;
            --text: #e0e0e0;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #nav {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }
        #nav a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 2px;
            opacity: 0.7;
            transition: 0.3s;
        }
        #nav a:hover { opacity: 1; }
        canvas {
            cursor: crosshair;
        }
        .ui {
            position: absolute;
            bottom: 30px;
            text-align: center;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div id="nav"><a href="../index.html">← /grow</a></div>
    <div class="ui">Click to seed growth</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const phi = 1.61803398875;
        let spirals = [];

        class Spiral {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.angle = 0;
                this.scale = 1;
                this.color = `hsl(${Math.random() * 60 + 30}, 70%, 50%)`;
            }

            draw() {
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 1;
                ctx.lineCap = 'round';

                let x = this.x;
                let y = this.y;
                let radius = 2;

                ctx.moveTo(x, y);

                for (let i = 0; i < 150; i++) {
                    this.angle = i * 0.2;
                    radius *= Math.pow(phi, 0.05);
                    
                    let px = this.x + Math.cos(this.angle) * radius;
                    let py = this.y + Math.sin(this.angle) * radius;
                    
                    ctx.lineTo(px, py);
                    ctx.stroke();
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.1)';
            ctx.fillRect(0, 0, width, height);
            spirals.forEach(s => s.draw());
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => {
            spirals.push(new Spiral(e.clientX, e.clientY));
            if(spirals.length > 5) spirals.shift();
        });

        // Initial seed
        spirals.push(new Spiral(width/2, height/2));
        animate();
    </script>
</body>
</html>
