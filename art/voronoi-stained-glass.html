<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Voronoi Stained Glass</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --lead: #1a1a1f; --text: #e0e0e0; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow: hidden; }
        a { position: absolute; top: 20px; left: 20px; z-index: 10; color: #666; text-decoration: none; font-size: 12px; letter-spacing: 1px; transition: 0.3s; }
        a:hover { color: #fff; }
        canvas { display: block; cursor: crosshair; }
        .ui { position: absolute; bottom: 30px; left: 30px; z-index: 10; pointer-events: none; }
        h1 { margin: 0; font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        p { font-size: 10px; opacity: 0.6; margin-top: 5px; }
    </style>
</head>
<body>
    <a href="../index.html">← /grow</a>
    <div class="ui">
        <h1>Voronoi Glass</h1>
        <p>TAP TO REGENERATE • CATHEDRAL FRACTURE</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        const colors = ['#8B0000', '#00008B', '#006400', '#DAA520', '#4B0082', '#8B4513'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generate();
        }

        function generate() {
            points = [];
            const count = 40;
            for (let i = 0; i < count; i++) {
                points.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
            draw();
        }

        function draw() {
            ctx.fillStyle = '#0a0a0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            for (let x = 0; x < canvas.width; x += 2) {
                for (let y = 0; y < canvas.height; y += 2) {
                    let minDist = Infinity;
                    let closest = 0;
                    for (let i = 0; i < points.length; i++) {
                        let d = Math.hypot(points[i].x - x, points[i].y - y);
                        if (d < minDist) {
                            minDist = d;
                            closest = i;
                        }
                    }
                    
                    const rgb = hexToRgb(points[closest].color);
                    const alpha = 180 + Math.sin(minDist * 0.1) * 30;
                    
                    for(let i=0; i<2; i++) {
                        for(let j=0; j<2; j++) {
                            let idx = ((y + j) * canvas.width + (x + i)) * 4;
                            imageData.data[idx] = rgb.r;
                            imageData.data[idx + 1] = rgb.g;
                            imageData.data[idx + 2] = rgb.b;
                            imageData.data[idx + 3] = alpha;
                        }
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
            
            // Draw lead lines
            ctx.strokeStyle = '#1a1a1f';
            ctx.lineWidth = 4;
            points.forEach(p1 => {
                points.forEach(p2 => {
                    if (p1 === p2) return;
                    ctx.beginPath();
                    ctx.moveTo(p1.x, p1.y);
                    ctx.lineTo(p2.x, p2.y);
                    ctx.stroke();
                });
            });
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('click', generate);
        resize();
    </script>
</body>
</html>
